"$schema" = 'https://starship.rs/config-schema.json'

# --- LEFT prompt: path + git (Tokyo Night, powerline arrows) ---
format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260) """

# --- RIGHT prompt: every info module, each a self-contained pill ---
# Inactive modules render nothing (no empty segment); each active module
# carries its own left-facing "" divider.
right_format = """
$nodejs\
$bun\
$deno\
$python\
$ruby\
$rust\
$golang\
$java\
$kotlin\
$php\
$dotnet\
$c\
$swift\
$elixir\
$lua\
$haskell\
$julia\
$scala\
$perl\
$zig\
$dart\
$package\
$conda\
$docker_context\
$kubernetes\
$terraform\
$aws\
$gcloud\
$azure\
$time"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
style = "bg:#212736"
format = '[](fg:#212736)[ $symbol($version) ](fg:#769ff0 bg:#212736)'

